<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Main Page{% endblock title %}</title>
    <!-- Modern Bootstrap 5 CDN -->
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body style="background-color: pink;">

    <!-- Simplified Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="#">Auth System</a>
        
        <div class="navbar-nav me-auto">
            <a class="nav-link" href="/operations/">Home</a>

            {% if request.user.is_authenticated %}
                <span class="navbar-text text-white me-3">Hi, {{ request.user.username }}</span>
                <a class="nav-link" href="/operations/dashboard/">Dashboard</a>
                
                <!-- POST form for modern Django logout compliance -->
                <form action="/operations/logout/" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link nav-link border-0 align-baseline">Logout</button>
                </form>
            {% else %}
                <a class="nav-link" href="/operations/">Register</a>
                <a class="nav-link" href="/operations/">Login</a>
            {% endif %}
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="container mt-4">
        {% block body %}
        {% endblock body %}
    </div>

</body>
</html>
